build:
  builder: NIXPACKS
  nixpacksPlan:
    providers:
      - node
    buildCmd: |
      npm ci
      npx prisma generate
      mkdir -p /app/prisma
      npx prisma db push --accept-data-loss || true
      npm run build

deploy:
  startCommand: npm start
  healthcheckPath: /api/health
  healthcheckTimeout: 300
  restartPolicyType: ON_FAILURE
  restartPolicyMaxRetries: 3
